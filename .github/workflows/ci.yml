name: CI

on:
  push:
    branches:
      - main
      - 'release/*'
  pull_request:
  workflow_dispatch:

jobs:
  quality-gate:
    name: Prettier / ESLint / TypeScript / Vitest / tsup
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run quality gate (no Storybook)
        run: npm run check:verify:fast

  storybook-build:
    name: Storybook build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Storybook build
        run: npm run build-storybook
