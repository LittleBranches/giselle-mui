name: Deploy Storybook

# Runs ONLY when a PR is merged into main (i.e. on a push to main).
# Quality gate must pass before the deploy job starts — if any check fails
# the deploy job is skipped entirely and the old Storybook version stays live.
#
# Required GitHub repository secrets (Settings → Secrets → Actions):
#   VERCEL_TOKEN       — personal access token from vercel.com/account/tokens
#   VERCEL_ORG_ID      — from .vercel/project.json after `vercel link` (see docs/local-development.md)
#   VERCEL_PROJECT_ID  — from .vercel/project.json after `vercel link`

on:
  push:
    branches: [main]

jobs:
  # ── Job 1: Quality gate ────────────────────────────────────────────────────
  # Runs the full six-check quality gate (Prettier → ESLint → tsc → Vitest →
  # tsup build → Storybook build). If any check fails, the deploy job is
  # blocked by the `needs:` dependency and never runs.
  quality-gate:
    name: Quality gate
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '26'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run quality gate (verify mode — includes Storybook build)
        run: npm run check:verify
        env:
          CI: 'true'

  # ── Job 2: Deploy ──────────────────────────────────────────────────────────
  # Runs only if quality-gate passes. Uses the Vercel CLI with the prebuilt
  # workflow: pull project config → build → deploy to production.
  #
  # The build step re-runs `npm run build-storybook` via vercel.json's
  # buildCommand — this is the authoritative artifact that gets deployed.
  deploy:
    name: Deploy to Vercel (production)
    runs-on: ubuntu-latest
    needs: [quality-gate]
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '26'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel project configuration
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build Storybook via Vercel
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          CI: 'true'

      - name: Deploy to Vercel production
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
